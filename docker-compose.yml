services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lolbin
      POSTGRES_PASSWORD: lolbin_pass
      POSTGRES_DB: lolbin_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lolbin -d lolbin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # DATABASE_URL points the backend at the Postgres service above. Without
    # it the app silently defaults to a throwaway SQLite file in the container.
    environment:
      DATABASE_URL: postgresql+psycopg2://lolbin:lolbin_pass@db:5432/lolbin_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
