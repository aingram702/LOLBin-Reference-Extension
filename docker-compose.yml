version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lolbin
      POSTGRES_PASSWORD: lolbin_pass
      POSTGRES_DB: lolbin_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
